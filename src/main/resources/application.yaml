spring:
  application:
    name: product-crud-api
  datasource:
    url: jdbc:mysql://localhost:3306/product_crud_db
    username: product_user
    password: product_password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
